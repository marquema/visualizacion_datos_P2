<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Visualización Radial - PEC 2</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background-color: #f8f9fa; font-family: sans-serif; overflow: hidden; }
        svg { width: 100vw; height: 100vh; cursor: move; }
        .node circle { fill: #69b3a2; stroke: #fff; stroke-width: 2px; }
        .node text { font-size: 12px; font-weight: bold; }
        .link { fill: none; stroke: #ccc; stroke-width: 1.5px; }
    </style>
</head>
<body>
    <div id="viz"></div>
    <script>
        // 1. Datos Jerárquicos
        const data = {
            name: "PEC 2: BIENESTAR",
            children: [
                { name: "Grupo I", children: [{name: "Mapas"}, {name: "Barras"}] },
                { name: "Grupo II", children: [{name: "Radar"}, {name: "Heatmap"}] },
                { name: "Grupo III", children: [
                    { name: "Arbol Radial", children: [{name: "Interactividad"}, {name: "Zoom"}, {name: "Foco"}] }
                ]}
            ]
        };

        const width = window.innerWidth;
        const height = window.innerHeight;
        const radius = Math.min(width, height) / 2 - 80;

        const svg = d3.select("#viz")
            .append("svg")
            .call(d3.zoom().on("zoom", (event) => g.attr("transform", event.transform)))
            .append("g");

        const g = svg.append("g")
            .attr("transform", `translate(${width / 2},${height / 2})`);

        const tree = d3.tree()
            .size([2 * Math.PI, radius])
            .separation((a, b) => (a.parent == b.parent ? 1 : 2) / a.depth);

        const root = d3.hierarchy(data);
        tree(root);

        // Líneas (Links)
        g.selectAll(".link")
            .data(root.links())
            .join("path")
            .attr("class", "link")
            .attr("d", d3.linkRadial().angle(d => d.x).radius(d => d.y));

        // Nodos
        const node = g.selectAll(".node")
            .data(root.descendants())
            .join("g")
            .attr("class", "node")
            .attr("transform", d => `rotate(${d.x * 180 / Math.PI - 90}) translate(${d.y},0)`);

        node.append("circle").attr("r", 6);

        node.append("text")
            .attr("dy", "0.31em")
            .attr("x", d => d.x < Math.PI ? 10 : -10)
            .attr("text-anchor", d => d.x < Math.PI ? "start" : "end")
            .attr("transform", d => d.x >= Math.PI ? "rotate(180)" : null)
            .text(d => d.data.name)
            .clone(true).lower()
            .attr("stroke", "white")
            .attr("stroke-width", 3);
            
    </script>
</body>
</html>
